name: portal_si
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  http: ^1.2.1
  dio: ^5.4.0

  # Storage & Local Data
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  hive_flutter: ^1.1.0
  path: ^1.8.3

  # State Management
  provider: ^6.0.0

  # UI & Widgets
  cached_network_image: ^3.4.1
  flutter_spinkit: ^5.2.0
  cupertino_icons: ^1.0.8
  page_transition: ^2.1.0
  flutter_svg: ^2.1.0
  qr_flutter: ^4.1.0
  palette_generator: ^0.3.3+4
  visibility_detector: ^0.4.0+2

  # Media Handling
  image_picker: ^1.0.7
  file_picker: ^10.3.2
  audioplayers: ^6.0.0
  permission_handler: ^12.0.1
  record: ^6.1.1
  wechat_assets_picker: ^9.6.0
  video_player: ^2.9.1
  video_thumbnail: ^0.5.3
  photo_manager: ^3.1.1

  # Utils
  fluttertoast: ^8.2.12
  share_plus: ^11.1.0
  intl: ^0.20.2

  # Realtime / Network
  web_socket_channel: ^3.0.3
  socket_io_client: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
