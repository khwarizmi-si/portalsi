# === Portal SI Web — reverse proxy OpenLiteSpeed (CyberPanel) ===
#
# Cara pakai:
#   CyberPanel > Websites > app.portalsi.com > Manage > "vHost Conf"
#   Tempel kedua blok di bawah ke dalam konfigurasi vhost tersebut.
#   Simpan, lalu jalankan di server:  sudo systemctl restart lsws
#
# Node berjalan di 127.0.0.1:3100 (dijalankan oleh setup-vps.sh via pm2).
# Dengan "context /" bertipe proxy, SEMUA request diteruskan ke Node —
# folder public_html tidak lagi disajikan sebagai file statis.

extprocessor portalsi {
  type                    proxy
  address                 127.0.0.1:3100
  maxConns                100
  initTimeout             60
  retryTimeout            0
  respBuffer              0
  pcKeepAliveTimeout      60
}

context / {
  type                    proxy
  handler                 portalsi
  addDefaultCharset       off
}
